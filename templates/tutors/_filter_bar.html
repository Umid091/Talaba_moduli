{# Reusable filter bar #}
<form method="get" class="filters">
    <div class="form-grid">
        <div class="form-group">
            <label>🔍 Qidiruv</label>
            <input type="text" name="q" value="{{ filters.q|default:'' }}" placeholder="Ism, familiya, telefon..." class="form-input">
        </div>
        {% if show_faculty|default:True %}
        <div class="form-group">
            <label>Fakultet</label>
            <select name="faculty" class="form-input">
                <option value="">— Hammasi —</option>
                {% for f in faculties %}
                    <option value="{{ f.id }}" {% if filters.faculty == f.id|stringformat:'s' %}selected{% endif %}>{{ f.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        <div class="form-group">
            <label>Guruh</label>
            <select name="group" class="form-input">
                <option value="">— Hammasi —</option>
                {% for g in groups %}
                    <option value="{{ g.id }}" {% if filters.group == g.id|stringformat:'s' %}selected{% endif %}>{{ g }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Kurs</label>
            <select name="course" class="form-input">
                <option value="">— Hammasi —</option>
                {% for c in '12345' %}
                    <option value="{{ c }}" {% if filters.course == c %}selected{% endif %}>{{ c }}-kurs</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Yashash turi</label>
            <select name="housing" class="form-input">
                <option value="">— Hammasi —</option>
                <option value="rent" {% if filters.housing == 'rent' %}selected{% endif %}>Ijarada</option>
                <option value="dormitory" {% if filters.housing == 'dormitory' %}selected{% endif %}>Yotoqxonada</option>
                <option value="home" {% if filters.housing == 'home' %}selected{% endif %}>O'z uyida</option>
            </select>
        </div>
        <div class="form-group">
            <label>Hudud</label>
            <select name="region" class="form-input">
                <option value="">— Hammasi —</option>
                {% for r in regions %}
                    <option value="{{ r.id }}" {% if filters.region == r.id|stringformat:'s' %}selected{% endif %}>{{ r.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Tuman</label>
            <select name="district" class="form-input">
                <option value="">— Hammasi —</option>
                {% for d in districts %}
                    <option value="{{ d.id }}" {% if filters.district == d.id|stringformat:'s' %}selected{% endif %}>{{ d.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Moliyaviy holat</label>
            <select name="debt" class="form-input">
                <option value="">— Hammasi —</option>
                <option value="yes" {% if filters.debt == 'yes' %}selected{% endif %}>Qarzdorlar</option>
                <option value="no" {% if filters.debt == 'no' %}selected{% endif %}>Qarzdor emas</option>
            </select>
        </div>
    </div>
    <div class="btn-row">
        <button class="btn btn-primary" type="submit">🔎 Filterlash</button>
        <a href="{{ request.path }}" class="btn btn-secondary">↻ Tozalash</a>
    </div>
</form>
